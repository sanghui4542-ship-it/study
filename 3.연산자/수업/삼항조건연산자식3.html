    <script>
//주제 : 세개의 숫자 중 가장 큰 수를 삼항조건연산자 식으로 구하는 예

//세개의 숫자를 각각 상수메모리를 만들어 저장
const num1 = 10;       const num2 = 20;     const num3 = 15;

//삼항조건연사자식을 사용하여 가장 큰 수 찾기
//const max = 조건식 ? 조건식이 참일 때 실행될 코드 : 조건식이 거짓일때 실행될 코드;
//             조건식      ?    
const max = (num1 > num2) ? (num1 > num3 ? num1 : num3) : (num2 > num3 ? num2 : num3);
          //  10  >  20   ? ( 10  >  15  ?  10  :  15 ) : (20   >  15  ?  20   :  15);
         //    false                                        true    ? true  : false

         //const num1 = 30;       const num2 = 20;     const num3 = 15;
           //const max = (num1 > num2) ? (num1 > num3 ? num1 : num3) : (num2 > num3 ? num2 : num3);
          //  30  >  20                ? ( 30  >  15  ?  30  :  15 ) : (20   >  15  ?  20   :  15);
         //    true                          true     ? true : false :            
console.log(max);

    </script>
</body>
