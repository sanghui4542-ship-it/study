<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 배열 2차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}
.g{background:#fff7e8;border:1px solid #f0d999;border-radius:10px;padding:14px 16px;color:#6b4e16}
code{background:#eee;border-radius:4px;padding:1px 6px;font-family:monospace}</style></head><body>
  <h1>⌨️ 실습 - 아이템 줍고 버리기</h1>
  <div class="g"><b>준비:</b> 브라우저로 열고 <code>F12</code> → <b>콘솔</b> 탭을 켜두세요.</div>
  <script>
/*
    주제 : 배열 추가/삭제

    - push(값)    : 뒤에 추가,   pop()   : 뒤에서 삭제
    - unshift(값) : 앞에 추가,   shift() : 앞에서 삭제
    - 메서드라 괄호() 를 붙임
*/

// [1] "칼","방패" 2개를 담은 'items' 배열을 만드세요.
//     작성 공식: let 배열이름 = [값1, 값2];
let items = ["칼", "방패"];
//console.log(items);   <---------- (2) ['칼', '방패'] 출력됨

// [2] items 뒤에 "물약"을 추가하세요.
//     작성 공식: 배열.push(값);
items.push("물약");

// [3] items 를 출력하세요.
console.log(items); //(3) ['칼', '방패', '물약'] <- "물약"이 추가된 것을 확인할 수 있음

// [4] items 뒤에 "갑옷"을 추가하세요.
items.push("갑옷");

// [5] items 를 출력하세요.
console.log(items); //(4) ['칼', '방패', '물약', '갑옷'] 출력 

// [6] items 뒤에서 하나 삭제하세요.
//     작성 공식: 배열.pop();
items.pop();

// [7] items 를 출력하세요.
console.log(items); //(3) ['칼', '방패', '물약'] <------ 맨뒤에 있는 갑옷이 삭제되었음을 확인 

// [8] items 앞에 "방패막이"를 추가하세요.
//     작성 공식: 배열.unshift(값);
items.unshift("방패막이");

// [9] items 를 출력하세요.
console.log(items); //(4) ['방패막이', '칼', '방패', '물약'] 출력됨을 확인인

// [10] items 앞에서 하나 삭제하고 출력하세요.
//      작성 공식: 배열.shift();
items.shift();
console.log(items); //(3) ['칼', '방패', '물약'] 출력됨

  </script></body></html>
