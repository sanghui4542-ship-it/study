<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 배열 4차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}
.g{background:#fff7e8;border:1px solid #f0d999;border-radius:10px;padding:14px 16px;color:#6b4e16}
code{background:#eee;border-radius:4px;padding:1px 6px;font-family:monospace}</style></head><body>
  <h1>⌨️ 실습 - 인벤토리 다루기 (map/filter)</h1>
  <div class="g"><b>준비:</b> 브라우저로 열고 <code>F12</code> → <b>콘솔</b> 탭을 켜두세요.</div>
  <script>
/*
    주제 : map 과 filter (배열 가공)

    - map(콜백)    : 모든 값을 변환 → 새 배열 (개수 같음)
    - filter(콜백) : 조건에 맞는 값만 선별 → 새 배열
    - 원본은 그대로, 새 배열을 돌려줌
*/

// [1] 가격 [100,200,50,300] 을 담은 'prices' 배열을 만드세요.
//     작성 공식: let 배열이름 = [값들];
let prices = [100, 200, 50, 300];

// [2] map 으로 모든 가격을 2배로 만든 새 배열을 출력하세요.
//     작성 공식: console.log(배열.map(p => p * 2));
console.log(prices.map(p => p * 2)); //(4) [200, 400, 100, 600]이 출력

// [3] filter 로 100 이상인 가격만 고른 새 배열을 출력하세요.
//     작성 공식: console.log(배열.filter(p => p >= 100));
console.log(prices.filter(p => p >= 100)); //(3) [100, 200, 300]가 출력, p가 100보다 크거나 같았던 것(조건식)을 다시 원래대로 콜백 

// [4] 몬스터 체력 [30,80,50,100] 을 담은 'hps' 배열을 만드세요.
let hps = [30, 80, 50, 100];

// [5] filter 로 50 이상인 체력만 고른 새 배열을 'strong' 에 저장하세요.
//     작성 공식: let 새배열 = 배열.filter(h => h >= 50);
let strong = hps.filter(h => h >= 50); // h가 50보다 크거나 같은 것만 strong에 저장

// [6] strong 을 출력하세요.
console.log(strong); //(3) [80, 50, 100]이 출력

// [7] map 으로 모든 체력에 "HP" 를 붙인 새 배열을 출력하세요.
//     작성 공식: 배열.map(h => h + "HP")
let HP = strong.map(h=> h + "HP"); //'h'가 어떤 문자가 와도 동일하게 출력됨
console.log(HP); //(3) ['80HP', '50HP', '100HP']이 출력

  </script></body></html>
