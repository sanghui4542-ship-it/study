<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>배열 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : map 과 filter (콜백 활용)

    - map(콜백)    : 모든 값을 변환 → 새 배열 (개수 같음)
    - filter(콜백) : 조건에 맞는 값만 선별 → 새 배열 (개수 줄 수 있음)
    - 콜백은 화살표 함수로 (n => ...)
    - 원본 배열은 그대로 두고 '새 배열'을 돌려줌
*/

// [1] 숫자 1,2,3,4를 담은 'nums' 배열을 만드세요.
//     작성 공식: let 배열이름 = [값들];
let nums = [1, 2, 3, 4];

// [2] map 으로 모든 값을 2배로 만든 새 배열을 'doubled' 에 저장하세요.
//     작성 공식: let 새배열 = 배열.map(n => n * 2);
let doubled = nums.map(n => n * 2); //화살표 기호 까먹지 말기!

// [3] doubled 를 출력하세요.
console.log(doubled); //(4) [2, 4, 6, 8]이 출력

// [4] filter 로 2보다 큰 값만 고른 새 배열을 'big' 에 저장하세요.
//     작성 공식: let 새배열 = 배열.filter(n => n > 2);
let big = doubled.filter(b => b > 2);

// [5] big 을 출력하세요.
console.log(big); //(3) [4, 6, 8]이 출력

// [6] 몬스터 체력 [30, 80, 50, 100] 을 담은 'hps' 배열을 만드세요.
let hps = [30, 80, 50, 100];

// [7] map 으로 모든 체력을 10씩 늘린 새 배열을 출력하세요.
//     작성 공식: 배열.map(h => h + 10)
hps.map(h => h + 10);
console.log(hps); //(4) [30, 80, 50, 100]

// [8] filter 로 체력 50 이상인 몬스터만 고른 새 배열을 출력하세요.
//     작성 공식: 배열.filter(h => h >= 50)
hps.filter(h => h >= 50);
console.log(hps); //(4) [30, 80, 50, 100] 출력

// [9] 점수 [90, 45, 80, 30, 100] 을 담은 'scores' 배열을 만드세요.
let scores = [90, 45, 80, 30, 100];

// [10] filter 로 60점 이상(합격)만 고른 새 배열을 'passed' 에 저장하고 출력하세요.
let passed = scores.filter(s => s >= 60);
console.log(passed); //(3) [90, 80, 100] 출력

</script>
</body>
</html>
