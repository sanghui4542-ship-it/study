<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>배열 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : 배열에 값 추가/삭제

    - push(값)    : 배열 뒤에 추가
    - pop()       : 배열 뒤에서 삭제
    - unshift(값) : 배열 앞에 추가
    - shift()     : 배열 앞에서 삭제
    - 메서드 호출이므로 괄호() 를 붙입니다
*/

// [1] "칼","방패" 2개를 담은 'items' 배열을 만드세요.
//     작성 공식: let 배열이름 = [값1, 값2];

// [2] items 뒤에 "물약"을 추가하세요.
//     작성 공식: 배열.push(값);

// [3] items 를 출력하세요.

// [4] items 뒤에 "갑옷"을 추가하세요.

// [5] items 를 출력하세요.

// [6] items 뒤에서 하나 삭제하세요.
//     작성 공식: 배열.pop();

// [7] items 를 출력하세요.

// [8] items 앞에 "방패막이"를 추가하세요.
//     작성 공식: 배열.unshift(값);

// [9] items 를 출력하세요.

// [10] items 앞에서 하나 삭제하세요.
//      작성 공식: 배열.shift();

// [11] items 를 출력하세요.
</script>
</body>
</html>
