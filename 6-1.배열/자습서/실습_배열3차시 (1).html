<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>배열 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : 배열 길이와 순회

    - .length : 배열의 개수 (값이라 괄호 없음! .length() 아님)
    - 순회 : for 문으로 0번부터 length 미만까지 돌며 전체 값을 꺼냄
    - 작성 공식 : for (let i = 0; i < 배열.length; i++) { 배열[i] }
    - 인덱스가 0부터인 것과 i=0 시작이 딱 맞아떨어짐
*/

// [1] "칼","방패","물약"을 담은 'items' 배열을 만드세요.
//     작성 공식: let 배열이름 = [값1, 값2, 값3];
let items = ["칼","방패","물약"];

// [2] items 의 개수(길이)를 출력하세요.
//     작성 공식: console.log(배열.length);  (괄호 없음)
console.log(items.length); // 3출력

// [3] for 문으로 items 전체를 하나씩 출력하세요.
//     작성 공식: for (let i=0; i<배열.length; i++) { console.log(배열[i]); }
for(let i=0; i<items.length; i++){console.log(items[i]);} // 칼,방패,물약 개별 출력

// [4] 숫자 10, 20, 30, 40을 담은 'nums' 배열을 만드세요.
let nums = [ 10, 20, 30, 40 ];

// [5] nums 의 길이를 출력하세요.
console.log(nums.length); // 4출력

// [6] 'sum' 변수에 0을 저장하세요.
let sum = 0;

// [7] for 문으로 nums 전체를 더해 sum 에 누적한 뒤, sum 을 출력하세요.
//     작성 공식: 반복 안에서 sum += 배열[i];
for(i=0; i<nums.length; i++){
    sum += nums[i];  
} 
 console.log(sum);//콘솔을 for문 중괄호 안에 넣을 경우 10,30,60,100 순으로 차례로 더하는 게 출력
 // 바깥으로 뺏을 경우 결과값 100만 출력 


// [8] "고블린","오크","드래곤"을 담은 'monsters' 배열을 만드세요.
let monsters = ["고블린","오크","드래곤"];

// [9] for 문으로 "OO 등장!" 형태로 전체를 출력하세요.
//     작성 공식: console.log(배열[i] + " 등장!");
for(i=0; i<monsters.length; i++){
    console.log(monsters[i] + " 등장!"); // 고블린 등장!,오크 등장!, 드래곤 등장! 순으로 출력
}

</script>
</body>
</html>
