<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>배열 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : 배열 만들기와 인덱스로 꺼내기

    - 배열 : 여러 값을 순서대로 담는 자료. 대괄호 [ ] 로 만들고 쉼표로 구분
    - 작성 공식 : let 배열이름 = [값1, 값2, 값3];
    - 인덱스(칸 번호)는 0부터! 첫 번째가 0번, 두 번째가 1번
    - 꺼내기 : 배열[번호]  → 그 칸의 값
*/

// [1] "칼","방패","물약" 3개를 담은 'items' 배열을 만드세요.
//     작성 공식: let 배열이름 = [값1, 값2, 값3];

// [2] items 전체를 출력하세요.

// [3] 0번 칸(첫 번째)을 출력하세요.
//     작성 공식: console.log(배열[번호]);

// [4] 1번 칸(두 번째)을 출력하세요.

// [5] 2번 칸(세 번째)을 출력하세요.

// [6] 숫자 90, 80, 70을 담은 'scores' 배열을 만드세요.

// [7] scores 의 0번과 2번을 더해 출력하세요.
//     작성 공식: console.log(배열[0] + 배열[2]);

// [8] "기사","마법사","궁수"를 담은 'party' 배열을 만드세요.

// [9] party 의 1번을 "성기사" 로 바꾸세요.
//     작성 공식: 배열[번호] = 새값;

// [10] party 전체를 출력하세요.
</script>
</body>
</html>
