<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
         /*
                함수를 정의 하는 방법(만드는 방법) 중에서
                    방법2. 함수표현식 const 상수명 = function 이용 방법

방법2-1. 이름이 있는 함수 정의 문법

        const 상수명  = function 함수명(){   <---------------------이름이 있는(네이밍) 함수 정의
        
            함수의 기능을 코드로 작성;

        }







                -------------함수 정의 문법--------------------------------


                const 상수명 = function 함수명(){
                
                함수의 기능을 코드로 작성;

                };
         
         -------------------함수 호출해서 사용하는 문법-------------------------

         상수명();
         */

         //실습1. 함수표현식 작성 방법(네이밍 함수형태)으로 구구단 3단을 반복해서 출력하는 기능의 함수 정의
         const gugudan = function naming(){   //<-- naming 이름이 존재하는 네이밍 함수 형태

             //구구단에서 곱하는 수만큼 반복해서 3단 출력
             for(let i=1; 1<=9; i++){
                    console.log(`3 * ${i} = ${3*i}`);
             }
         };

         //실습2. 위 정의 해 놓은 naming 함수 호출
         //상수명();
         gugudan();

         console.log("------------------------------------------------------------------------------");

         //실습3. 함수표현식 작성 방법(익명 함수형태)으로 구구단 4단을 반복해서 출력하는 기능의 함수 정의
         
         const gugudan2 = function (){//<- 이름이 존재하지 않는 익명함수 형태로 정의 가능

            for(let i=1; i=9; i++){
                console.log(`4 * ${i} = ${4*i}`);
            }
         };
         //4단 출력하기 위해 gugudan2상수메모리에 저장된 익명함수 호출!
         //상수명(;)
         gugudan2();
         









    </script>






</body>
</html>
