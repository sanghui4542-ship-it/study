<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /* 
            0. 함수란? 실행할 코드를 하나의 이름으로 선언해 두고,
                      개발자가 코드 실행이 필요할 때마다 그 이름으로 호출해ㅐ서 코드를 실행하는 문법.
            
            1. 함수 만들기(선언)
            
                function 함수명() {              
                
                    실행할 코드1;
                    실행할 코드2;
                    .........                
                }

                2. 함수 호출 구문

                    함수명();

                3. 이 실습의 핵심
                    - 함수 선언은 실행할 코드를 준비하는 단계 입니다.
                    - 함수는 선언만 해서는 실행할 코드가 실행되지 않는다.
                    - 함수명 뒤에 ()를 붙여 -> 함수명(); 이렇게 호출해야 실행할 코드가 실행된다.            

*/

        //1. 함수를 선언하지 않고 구구단 3단을 직접 출력합니다.
        // 같은 형태의 console.log()가 여러 번 반복해서 작성해야 합니다.
        console.log(" 3 * 1 = 3 ");
        console.log(" 3 * 2 = 6 ");
        console.log(" 3 * 3 = 9 ");
        console.log(" 3 * 4 = 12 ");
        console.log(" 3 * 5 = 15 ");
        console.log(" 3 * 6 = 18 ");
        console.log(" 3 * 7 = 21 ");
        console.log(" 3 * 8 = 24 ");
        console.log(" 3 * 9 = 27 ");

        console.log("-----------------------------------------------");

        //2. for 반복문을 사용하면 반복되는 출력 코드를 한 줄로 작성해서 줄일 수 있다.
        for (let i = 1; i <= 9; i++) {


            console.log(`3  * ${i} = ${3 * i}`);
        }

        console.log("----------------------------------------------------");

        //3. gugudan 함수 선언
        // 함수 선언은 실행할 코드를 준비하는 단계이다.
        function gugudan() {

            //실행할 코드를 준비 해 놓는다.
            for (let i = 1; i <= 9; i++) {
                console.log(`3  * ${i} = ${3 * i}`);
            }

        }//<------------------ gugudan 함수 닫는 중괄호

        //4. gugudan 함수 호출
        gugudan(); //1번 호출 -> for전체가 실행
        gugudan(); //2번 호출 -> for전체가 실행

      

    </script>



</body>

</html>
