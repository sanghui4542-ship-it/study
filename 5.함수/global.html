<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            스코프 - 스코프는 변수나 함수를 사용할 수 있는 코드 범위입니다.

         ---------- 전역 스코프 : 함수 외부 영역 -------

         let 변수명 = 값: <--------- 전역 변수 라고 부른다.

         function 함수명(){
         
            ---------- 지역 스코프 : 함수 내부 영역 --------------
            let 변수명 = 값;         <--------- 지역 변수라고 부른다.         
         
         }


        */  
        //------------ 전역 스코프 영역(함수 외부 영역)에 전역 변수 선언후 10 저장
        let a = 10;

        function sum(){
            //--------------- 지역 스코프 영역(함수 내부 영역) 내부에서 전역변수 값 얻어 사용할 수 있다.
            console.log(`함수 내부 : ${a}`);
                      //`함수 내부 : 10`
        }
        //----------- 전역 스코프 영역(함수 외부 영역)
        //함수 호출
        sum();

        //----------- 전역 스코프 영역(함수 외부 영역)에서 전역변수 값 얻어 사용할 수 있다.
        console.log(`함수 외부 : ${a}`);
                    //`함수 외부 : 10`

/*    
      위 코드를 보면 전역 스코프의 참조관계를 이해해 봅시다.
      코드를 보면 함수 외부에 변수 a를 선언하고, 선언한 변수를 함수 내부와 외부에서 각각 사용(참조)할수 있다.

      실행결과를 보면 함수 내부와 외부에서 아무런 문제 없이 정삭적으로 변수a를 참조해 출력합니다.
      이는 함수 외부는 전역스코프이고, 전역 스코프는 스코프와 상관없이 모두 참조할수 있기때문입니다.
*/            

        console.log("--------------------------------------------------------------------------------------");

        function sum2(){
            //--------------------------- 지역 스코프 영역(함수 내부 영역)에 지역변수 b를 선언하고 10 저장
            let b = 10;

            console.log(`함수 내부 영역 : ${b}`); //함수 내부 영역에서 b변수값 가져와 출력 가능

        }

        sum2(); //함수 호출

        //---------------------전역 스코프 영역(함수 외부 영역)에서 지역 스코프 영역에 선언한 b변수의 값을 가져와서 출력 불가능
        console.log(`함수 외부 영역 : ${b}`); 
        //Uncaught ReferenceError: b is not defined

        //결론 : 함수 내부에 선언한 변수 b는 지역스코프영역에 선언한 지역변수입니다.
        //      따라서 함수 내부가 아닌 외부에서 변수b를 참조해서 출력하려면 오류가 발생함

        

    </script>
</body>
</html>
