<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 변수 만들 때 어떤 키워드를 사용합니까?  let 또는 var

        //var 변수명 = 10;   // <- 자바스크립트 이전버전의 문법에서 var 예약어로 변수를 만들었다.
        //let 변수명 = 100;  // <- 자바스크립트 상위버전에서 업데이트 되어 문법에서 let 예약어로 이제 변수를 만듭니다.

        //블록문 {  } 를 기준으로 전역스코프 영역에 전역변수 a를 선언하고 10 저장
        var a = 10; //<---- 전역 변수 a

        //호이스팅 되어 var b; 선언 작성이 끌어 올라와 작성되는 것이다. 
        //var b; 

        //블록문{   }
        {
            //-----블록문 내부 영역(지역 스코프)에 var 키워드를 사용하여 지역변수를 만든 경우
            var b = 20; //<---- 지역변수 b
            
            console.log(`블록문 내부(지역 스코프)에서 a변수값 얻어 출력 : ${a}` ); //10
            console.log(`블록문 내부(지역 스코프)에서 b변수값 얻어 출력 : ${b}` ); //20
        }


        //------ 블록문 외부 영역(전역 스코프)에서 console.log로 전역변수a , b지역변수 값 얻어 출력해보자.
        console.log(`블록문 외부(전역 스코프)에서 a변수값 얻어 출력 : ${a}`); //10
        
        //오류가 발생하지 않고 b지역변수 값 블록문 {} 외부에서도 가져와 출력 가능 합니다.
        //이유 : var 키워드로 만든 변수의 값은 블록문 {} 내부에 작성해 놓을 지는 몰라도
        //      ${b} 변수값을 출력하는 시점에 웹브라우저 프로그램은 var b; 변수 선언의 코드를 {} 블록문을 위로 끌어 올려 선언해 두기 때문에
        //      마치 var b; 전역변수로 만들어지면서 {}블록문 외부에서도 b변수값 20을 가져와 출력할 수 있습니다. 
        console.log(`블록문 외부(전역 스코프)에서 b변수값 얻어 출력 : ${b}`); //20

        
        //var 는 호이스팅(위로 끌어올려 작성되게 함함)가능
        //let 은 불가능


    </script>
</body>
</html>
