<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*
            함수를 만드는 방법(선언하는 방법) 3가지 중에서!!!!

            방법2. 표현식 방식으로 만들기 
                const 상수명 = function(){실행코드;              }; <- 익명함수
                const 상수명 = function 함수명(){  실행코드;      }; <- 네이밍함수
        
        사용해서 호이스팅 되는지 알아보자.                          
        */


        //2. 함수 표현식 방식으로 함수 만들기
        // -> 호이스팅이 안되어 실제 실행 결과를 보면
        //'printHello()는 함수가아니다'라는 오류메세지가 나옵니다.

        printHello(); //함수 호출


        //함수표현식 만들기(함수 선언)
        const printHello = function print() {

            console.log("Hello");
        };




    </script>
</body>

</html>
