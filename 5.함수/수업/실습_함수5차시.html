<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 함수 5차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}
.g{background:#fff7e8;border:1px solid #f0d999;border-radius:10px;padding:14px 16px;color:#6b4e16}
code{background:#eee;border-radius:4px;padding:1px 6px;font-family:monospace}</style></head><body>
  <h1>⌨️ 실습 - 지역변수 실험 (스코프)</h1>
  <div class="g"><b>준비:</b> 브라우저로 열고 <code>F12</code> → <b>콘솔</b> 탭을 켜두세요.</div>
  <script>
/*
    주제 : 스코프와 기본값 매개변수

    - 스코프 : 함수 안에서 만든 변수는 그 함수 안에서만 사용 가능
    - 기본값 매개변수 : function f(x = 10) { } → 인수 없으면 기본값 사용
*/

// [1] damage 를 받아 출력하되, 안 넣으면 10을 쓰는 'attack' 함수를 만드세요.
//     작성 공식: function 함수이름(매개변수 = 기본값) { ... }
function attack(damage = 10){
  console.log(damage);
}

// [2] attack 을 30으로 호출하세요.
attack(30);

// [3] attack 을 인수 없이 호출하세요. (기본값 10)
attack();

// [4] name 을 받아 인사하되, 안 넣으면 "용사"를 쓰는 'greet' 함수를 만드세요.
function greet(name = "용사"){
  console.log(name);
}

// [5] greet 을 "기사"로 호출하세요.
greet("기사");

// [6] greet 을 인수 없이 호출하세요.
greet();

// [7] 함수 안에 지역변수를 만들고 출력하는 'test' 함수를 만들고 호출하세요.
//     작성 공식: function test() { let secret = 100; console.log(secret); }
function test(){
  let secret = 100; 
  console.log(secret);
}
test();

  </script></body></html>
