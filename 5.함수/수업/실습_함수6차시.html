<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 함수 6차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}
.g{background:#fff7e8;border:1px solid #f0d999;border-radius:10px;padding:14px 16px;color:#6b4e16}
code{background:#eee;border-radius:4px;padding:1px 6px;font-family:monospace}</style></head><body>
  <h1>⌨️ 실습 - map과 filter (고차함수)</h1>
  <div class="g"><b>준비:</b> 브라우저로 열고 <code>F12</code> → <b>콘솔</b> 탭을 켜두세요.</div>
  <script>
/*
    주제 : 고차 함수 (map, filter)

    - map(콜백)    : 모든 값을 변환 → 새 배열
    - filter(콜백) : 조건에 맞는 값만 선별 → 새 배열
    - 콜백은 화살표 함수로 (n => ...)
*/

// [1] 숫자 1,2,3,4 를 담은 'nums' 배열을 만드세요.
//     작성 공식: let 배열이름 = [값들];
let nums = [1, 2, 3, 4];

// [2] map 으로 모든 값을 2배로 만든 새 배열을 출력하세요.
//     작성 공식: console.log(배열.map(n => n * 2));
console.log(nums.map(n => n * 2));

// [3] filter 로 2보다 큰 값만 고른 새 배열을 출력하세요.
//     작성 공식: console.log(배열.filter(n => n > 2));
console.log(nums.filter(n => n >2));

// [4] 몬스터 체력 [30,80,50,100] 을 담은 'hps' 배열을 만드세요.
let hps = [30,80,50,100];

// [5] map 으로 모든 체력을 10씩 늘린 새 배열을 출력하세요.
console.log(hps.map(n => n + 10));

// [6] filter 로 50 이상인 체력만 고른 새 배열을 'strong' 에 저장하세요.
//     작성 공식: let 새배열 = 배열.filter(h => h >= 50);
let strong = hps.filter(h => h >= 50);

// [7] strong 을 출력하세요.
console.log(strong);

  </script></body></html>
