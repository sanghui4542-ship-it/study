<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 함수 2차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}
.g{background:#fff7e8;border:1px solid #f0d999;border-radius:10px;padding:14px 16px;color:#6b4e16}
code{background:#eee;border-radius:4px;padding:1px 6px;font-family:monospace}</style></head><body>
  <h1>⌨️ 실습 - 피해 계산기</h1>
  <div class="g"><b>준비:</b> 브라우저로 열고 <code>F12</code> → <b>콘솔</b> 탭을 켜두세요.</div>
  <script>
/*
    주제 : 매개변수와 인수

    - 매개변수 : 함수 정의 괄호 안, 값을 받는 자리
    - 인수     : 함수 호출 괄호 안, 실제 넣는 값
    - 매개변수가 여러 개면 쉼표로 구분
*/

// [1] damage 를 받아 "OO 데미지!" 를 출력하는 'attack' 함수를 만드세요.
//     작성 공식: function 함수이름(매개변수) { console.log(매개변수 + "..."); }
function attack (damage){
  console.log(damage + " 데미지!");
}

// [2] attack 에 30을 넣어 호출하세요.
//     작성 공식: 함수이름(인수);
attack(30)

// [3] attack 에 50을 넣어 호출하세요.
attack(50)

// [4] name 을 받아 "OO 등장!" 을 출력하는 'appear' 함수를 만드세요.
function appear(name){
  console.log(name);
}

// [5] appear 에 "보스"를 넣어 호출하세요.
appear("보스")

// [6] name 과 damage 두 개를 받아 "OO에게 OO 데미지!" 출력하는 'hit' 함수를 만드세요.
//     작성 공식: function 함수이름(a, b) { console.log(a + "에게 " + b + "..."); }
function hit(a, b){
  console.log(a + "에게 " + b + "데미지!");
}

// [7] hit 에 "고블린"과 25를 넣어 호출하세요.
hit("고블린" , 25);
  </script></body></html>
