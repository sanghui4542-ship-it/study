<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 함수 3차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}
.g{background:#fff7e8;border:1px solid #f0d999;border-radius:10px;padding:14px 16px;color:#6b4e16}
code{background:#eee;border-radius:4px;padding:1px 6px;font-family:monospace}</style></head><body>
  <h1>⌨️ 실습 - 데미지 계산 (return)</h1>
  <div class="g"><b>준비:</b> 브라우저로 열고 <code>F12</code> → <b>콘솔</b> 탭을 켜두세요.</div>
  <script>
/*
    주제 : return (함수에서 가장 중요)

    - return : 함수가 계산한 값을 돌려줌
    - 호출한 자리가 돌려준 값으로 바뀜 → 변수에 담아 재사용
    - console.log(보여주기) ≠ return(값 돌려주기)
*/

// [1] a, b 를 더한 결과를 돌려주는 'add' 함수를 만드세요.
//     작성 공식: function 함수이름(a, b) { return a + b; }
function add(a, b){
  return a + b;
}

// [2] add(3, 5) 결과를 'result' 에 저장하세요.
//     작성 공식: let 변수 = 함수이름(인수);
let result = add(3, 5);

// [3] result 를 출력하세요.
console.log(result);

// [4] 공격력 a, 방어력 d 를 받아 데미지(a-d)를 돌려주는 'calcDamage' 함수를 만드세요.
function calcDamage(a, b){
  return a - b;
}

// [5] calcDamage(50, 20) 결과를 'damage' 에 저장하고 출력하세요.
let damage = calcDamage(50, 20);
console.log(damage);

// [6] calcDamage(80, 30) 결과에 2를 곱해 출력하세요. (치명타)
//     작성 공식: console.log(함수(인수) * 값);
console.log(calcDamage(80,30)*2);

// [7] hp 와 회복량을 받아 더한 값을 돌려주는 'heal' 함수를 만들고 heal(40,30)을 출력하세요.
function heal(a, b){
  return a + b;
}
console.log(heal(40,30));

  </script></body></html>
