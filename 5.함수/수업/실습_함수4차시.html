<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 함수 4차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}
.g{background:#fff7e8;border:1px solid #f0d999;border-radius:10px;padding:14px 16px;color:#6b4e16}
code{background:#eee;border-radius:4px;padding:1px 6px;font-family:monospace}</style></head><body>
  <h1>⌨️ 실습 - 화살표 함수</h1>
  <div class="g"><b>준비:</b> 브라우저로 열고 <code>F12</code> → <b>콘솔</b> 탭을 켜두세요.</div>
  <script>
/*
    주제 : 화살표 함수

    - 작성 공식 : const 함수이름 = (매개변수) => 돌려줄값;
    - 한 줄짜리는 return 과 중괄호 생략 가능
    - 매개변수 1개면 괄호도 생략 가능
*/

// [1] a, b 를 더해 돌려주는 'add' 화살표 함수를 만드세요.
//     작성 공식: const 함수이름 = (a, b) => a + b;
const add = (a, b) =>  a + b;
//const add = (a, b) => { return a + b; }

// [2] add(3, 5) 를 출력하세요.
console.log(add(3, 5));

// [3] x 를 받아 2배로 돌려주는 'double' 화살표 함수를 만드세요.
//     매개변수 1개면 괄호 생략: x => x * 2
const double = (x) => x * 2;
//const double = (x) => {return x * 2;}

// [4] double(10) 을 출력하세요.
console.log(double(10));

// [5] 공격력 a, 방어력 d 로 데미지를 돌려주는 'dmg' 화살표 함수를 만드세요.
const dmg = (c, d) =>  c + d ;

// [6] dmg(60, 25) 를 출력하세요.
console.log(dmg(60, 25));

// [7] level 을 받아 필요경험치(level * 100)를 돌려주는 'needExp' 화살표 함수를 만드세요.
const needExp = (level) => { return level * 100; }
//const needExp = (level) =>  level * 100; 

// [8] needExp(5) 를 출력하세요.
console.log(needExp(5));

  </script></body></html>
