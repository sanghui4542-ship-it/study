<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            [작성 문법 기준]

                1. 매개변수가 있는 함수 선언

                        function 함수명(매개변수1, 매개변수2) {
                        
                            실행할 코드;                                               
                        
                        }
        
                2. 인수를 전달하는 함수 호출 구문

                    함수명(인수1, 인수2);


                3. 기본값이 있는 매개변수
                
                    function 함수명(매개변수1 = 기본값1, 매개변수2 = 기본값2) {
                    
                    실행할 코드;

                    }

                4. 이 실습의 핵심
                    - 인수를 전달하지 않으면 매개변수에는 undefined가 저장된다.
                    - 전달한 인수를 받을 매개변수가 없으면 그 인수는 함수 내부에서 사용할 수 없다.
                    - 매개변수에 기본값을 작성하면 인수가 없을 때 기본값이 사용된다.
        
        */
       //1. x함수 선언
       //a와 b는 매개변수라고 부른다.
       function x(a, b){

            console.log(a,b);

       }
       //2. x 함수 호출
       //첫번째 인수 1은 a매개변수로 전달된다.
       //두번째 인수 2는 b매개변수로 전달된다.
       x(1, 2);

       console.log("------------------------------------------------------------------------------");

       //3. y 함수 선언
       function y(num1, num2) {

            //매개변수 num1과 num에 인수를 전달받지 못하면 num1과 num2에는 undefined가 저장된다.
            console.log(num1, num2);

       }
       //4. y 함수 호출
       //전달하는 인수가 없으므로 num1, num2매개변수는 undefined 이다.
       y();


       console.log("------------------------------------------------------------------------------");

       //5. z 함수 선언
       //매개변수가 없으므로 함수 내부에서 전달받은 값을 사용할 수 없다.
       function z(){

        console.log('매개변수가 없으면 전달된 인수를 함수 내부에서 사용할 수 없다.');

        }

        //6. z 함수 호출
        //10과 20 인수를 전달하지만 받을 매개변수가 없다.
        //오류는 발생하지 않지만, 함수 {} 내부에서 10과 20을 사용할 수 없다.
        z(10, 20);

        console.log("------------------------------------------------------------------------------");

        //7. 매개변수가 2개인 화살표 함수 선언
        //매개변수가 2개 이상이면 소괄호(매개변수1, 매개변수2) 를 작성했다.
        const s = (num1, num2) => { console.log(num1, num2); };

        //8. const s상수 메모리에 저장된 화살표 함수 호출
        //10은 num1매개변수에 전달되고, 20은 num2매개변수에 전달되어 {  }; 내부에서 사용하게 된다.
        s(10, 20);

        //9. 매개변수가 1개인 화살표 함수 선언
        //매개변수가 1개이면 소괄호 ()를 생략할 수 있다.
        const s2 = num1 => { console.log(num1) };

        //10. s2 상수메모리에 저장된 화살표 함수 호출
        //100은 num1매개변수로 전달되어 {    }; 내부로 전달되어 사용된다.
        s2(100);

        console.log("---------------------------------------------------------------------------------");

        //11. 기본값이 저장되어 있는 매개변수의 함수선언
        function sum(a = 10, b = 10){
            console.log(a, b);
        }
        //12. 인수 없이 호출
        //a와 b는 기본값 10을 사용한다.
        sum();

        //13. 인수를 전달해서 호출
        //전달된 인수가 있으면 기본값 대신 인수 값이 매개변수에 저장되어 사용된다.
        sum(20, 30);





    </script>
</body>
</html>
