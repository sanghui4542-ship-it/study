<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>함수 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : return (함수에서 가장 중요)

    - return : 함수가 계산한 값을 '돌려줌'
    - 호출한 자리가 돌려준 값으로 바뀜 → 변수에 담아 재사용 가능
    - console.log(화면에 보여주기) 와 return(값 돌려주기)은 다름
    - return 을 만나면 함수는 그 즉시 끝남
*/

// [1] a, b 를 받아 더한 결과를 돌려주는(return) 'add' 함수를 만드세요.
//     작성 공식: function 함수이름(a, b) { return a + b; }
function add(a, b){return a + b;}

// [2] add(3, 5) 의 결과를 'result' 변수에 저장하세요.
//     작성 공식: let 변수 = 함수이름(인수);
let result = add(3, 5);

// [3] result 를 출력하세요.
console.log(result);

// [4] 공격력 attack 과 방어력 defense 를 받아 데미지(attack-defense)를 돌려주는
//     'calcDamage' 함수를 만드세요.
function calcDamage(attack, defense){return attack - defense; }

// [5] calcDamage(50, 20) 결과를 'damage' 에 저장하고 출력하세요.
let damage = calcDamage(50, 20);

// [6] 돌려받은 값을 바로 다른 계산에 쓸 수도 있습니다.
//     calcDamage(80, 30) 결과에 2를 곱해 출력하세요. (치명타)
console.log(calcDamage(80,30)*2);

// [7] 현재체력 hp 와 회복량 amount 를 받아 더한 값을 돌려주는 'heal' 함수를 만드세요.
function heal(hp, amount){return hp + amount;}

// [8] heal(40, 30) 결과를 출력하세요.
console.log(heal(40, 30));

// [9] heal 의 결과를 'newHp' 에 저장한 뒤, newHp 가 100 이상인지 출력하세요.
let newHp = heal;
console.log(newHp >= 100);

</script>
</body>
</html>
