<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <!-- css 작성할 선언문 태그 영역 -->
    <style>
        /*바깥 쪽 for에서 9반복되면서 출력되는 모든 div를 한번에 선택해서 가져와 스타일 정의의*/
        div {
            display: inline-block; /*인라인 블록으로 설정하여 가로로 나열되도록 합니다.*/
            
            border: 1px solid gray; /*경계선을 설정함*/
                            
            padding: 0 20px 30px 20px; /*패딩을 설정합니다.  위쪽 0, 오른쪽 20px,  아래쪽 30px , 왼쪽 20px*/
            
            margin: 15px; /*마진을 설정합니다.  모든 방향 15px로 바깥여백 띄우기*/             
            
            line-height: 2; /*행간을 설정합니다. 2배*/
        }

        /*div태그 내부의 h3태그에 스타일 적용*/
        div h3 {
            text-align: center;
            /*텍스트 가운데 정렬*/
            font-weight: bold;
            /*글꼴을 굵게 설정*/
        }
    </style>
</head>
<body>
    <h1>구구단</h1>
    <script>
        
        
        //주제 : 중첩 for문을(바깥쪽for문안에 안쪽for문 같이사용) 이용하여
        //       CSS를 반영한 구구단 반복 출력 만들기
        // j=> 안쪽 for에서 사용

/*
// i : 바깥 for에서 사용 (현재 몇 단인지, 1~9)
// j : 안쪽 for에서 사용 (곱하는 수, 1~9)
*/

/*
    [바깥쪽 for문]
    i = 1에서 시작 -> i가 9이하일 때까지 반복 -> 한 번 반복할 때마다 i를 1씩 증가
    즉, 1단, 2단, 3단 ..... 9단을 차례로 만듭니다.
*/
for(i = 1; i <= 9; i++){

    //각 단마다 CSS가 적용된 박스(div)를 시작합니다.
    //위쪽 <style>에 div { border, padding, margin ... }이 적용됩니다.
    document.write("<div>");


        //현재 단 번호를 제목태그 (h3)으로 출력합니다.
        //예 : i가 3이면 화면에 <h3>3단</h3>이 만들어져 출력 됩니다.
        document.write("<h3>" + i + "단</h3>");

        /*
          [안쪽 for문]
          j = 1에서 시작 -> j가 9이하 일때까지 반복 -> 한 번 반복할 때마다 j를 1씩 증가
          바깥 for의 i 값(현재 단)은 그대로 두고, j만 1부터 9까지 바뀝니다.

        
        */


for(j = 1; j <= 9; j++){

//구구단 한 줄을 출력합니다.
// i * j : 곱셈 결과 (예 : 5 X 3 = 15에서 15)
document.write(i + "X" + j + "=" + i * j + "<dr>");




}


    document.write("</div>")








    }


    </script>
</body>

</html>
