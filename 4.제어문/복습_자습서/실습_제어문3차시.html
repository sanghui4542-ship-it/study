<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>제어문 실습</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.8;
            font-size: 16px
        }

        button {
            padding: 8px 16px;
            font-size: 15px;
            cursor: pointer;
            margin: 4px
        }

        input {
            padding: 8px;
            font-size: 15px;
            width: 250px
        }

        #out {
            margin-top: 16px;
            padding: 12px;
            background: #eef1fb;
            border-radius: 8px;
            min-height: 24px
        }
    </style>
</head>

<body>
    <h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
    <script>
        /*
            주제 : for 반복문
        
            - 작성 공식 : for (시작값; 반복조건; 증감) { 반복할 코드 }
                · let i = 1  → 시작값 (i를 1부터)
                · i <= 5     → 반복조건 (i가 5 이하인 동안)
                · i++        → 증감 (한 번 돌 때마다 i를 1 증가)
            - 정해진 횟수만큼 같은 작업을 반복할 때 사용
            - i 는 보통 0 또는 1부터 시작
        */

        // [1] i 를 1부터 5까지 1씩 늘리며 i 를 출력하세요.
        //     작성 공식: for (let i=시작; i<=끝; i++) { console.log(i); }
        for (let i = 1; i <= 5; i++) {
            console.log(i);
        }

        // [2] "공격!" 을 3번 출력하세요.
        //     i 를 0부터 3 미만까지 → 3번 반복
        for (let i = 0; i < 3; i++) {
            console.log(i + " 공격!");
        }

        // [3] 1부터 10까지 출력하세요.
        for (let i = 1; i <= 10; i++) {
            console.log(i);
        }

        // [4] "몬스터 " 와 번호를 붙여 1~3번 몬스터를 출력하세요.
        //     작성 공식: console.log("문자열" + i);
        for (let i = 1; i <= 3; i++) {
            console.log("몬스터" + i);
        }

        // [5] 'sum' 변수에 0을 저장하세요. (합계를 누적할 변수)
        let sum = 0;

        // [6] 1부터 5까지 더해서 sum 에 누적한 뒤, 마지막에 sum 을 출력하세요.
        //     작성 공식: 반복문 안에서 sum += i;
        for (let i = 1; i <= 5; i++) {
            sum += i;
            console.log(sum);

        }

    </script>
</body>

</html>
