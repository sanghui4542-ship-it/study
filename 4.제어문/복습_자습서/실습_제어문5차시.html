<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>제어문 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : 반복문 + 조건문 조합

    - for 반복문 안에 if 조건문을 넣어 '반복하며 골라내기'
    - 나머지 % 와 if 를 함께 쓰면 짝수/홀수/배수 판별 가능
    - 게임에서 "여러 번 공격하며 특정 턴에만 치명타" 같은 로직에 사용
*/

// [1] 1부터 10까지 반복하며, 짝수일 때만 출력하세요.
//     짝수 판별: i % 2 === 0
//     작성 공식: for(...){ if(i % 2 === 0){ console.log(i); } }
for(let i = 1; i <= 10; i++){
    if(i % 2 === 0){
        console.log(i);
    }
}

// [2] 1부터 10까지 반복하며, 홀수일 때만 출력하세요.
//     홀수 판별: i % 2 === 1
for(let i = 1; i <= 10; i++){
    if(i % 2 === 1){
        console.log(i);
    }
}

// [3] 1부터 5까지 반복하며, 3일 때만 "보스 등장!"을 출력하세요.
for(let i = 1; i <=5; i++){
    if(i === 3){
        console.log( i + " 보스 등장!");
    }
}

// [4] 1부터 6까지 반복하며, 3 이상이면 "위험 구간", 아니면 "안전 구간"을 출력하세요.
//     작성 공식: 반복 안에서 if/else
for(let i = 1; i <= 6; i++){
    if(i >= 3){
        console.log(i + " 위험 구간");
    } else{
        console.log(i + " 안전 구간");
    }
}

</script>
</body>
</html>
