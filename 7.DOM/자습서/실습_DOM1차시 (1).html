<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>DOM 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>주석 설명을 보며 직접 코드를 작성하세요. (아래 화면 요소를 자바스크립트로 다룹니다)</h3>
<h1 id="title">제목입니다</h1>
<p class="desc">설명 문단입니다</p>
<p id="score">점수: 0</p>

<script>
/*
    주제 : 요소 선택 (querySelector)

    - document.querySelector("선택자") : 조건에 맞는 첫 요소를 집어냄
    - 선택자는 CSS와 동일 : # (id), . (class)
    - 선택한 요소는 변수에 담아 사용
    - F12 → Console 탭에서 결과를 관찰하세요
*/

// [1] id가 title 인 요소를 선택해 'title' 변수에 저장하세요.
//     작성 공식: let 변수 = document.querySelector("#아이디");

// [2] title 을 출력하세요. (선택된 요소가 콘솔에 나옴)
//     작성 공식: console.log(변수);

// [3] class가 desc 인 요소를 선택해 'desc' 변수에 저장하세요.
//     작성 공식: let 변수 = document.querySelector(".클래스");

// [4] desc 를 출력하세요.

// [5] id가 score 인 요소를 선택해 'scoreEl' 변수에 저장하세요.

// [6] scoreEl 을 출력하세요.

// [7] title 요소 안의 글자(textContent)를 출력하세요.
//     작성 공식: console.log(요소.textContent);
</script>
</body>
</html>
