<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>객체 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : 객체 배열 (배열 + 객체 결합)

    - 배열 안에 객체를 여러 개 담은 형태 → 실무 데이터의 대부분
    - 작성 공식 : let 배열 = [ {key:value}, {key:value} ];
    - 꺼내기 : 배열[번호].key  (먼저 배열에서 객체, 그다음 객체에서 값)
    - for 로 순회하며 각 객체의 값을 꺼낼 수 있음
*/

// [1] {name:"기사", hp:100} 과 {name:"마법사", hp:80} 두 객체를 담은
//     'party' 배열을 만드세요.
//     작성 공식: let 배열 = [ {...}, {...} ];
let party = [{name:"기사", hp:100}, {name:"마법사", hp:80}];

// [2] party 의 0번 객체의 name 을 출력하세요.
//     작성 공식: console.log(배열[번호].key);
console.log(party[0].name); //"기사" 출력 / .key는 객체로 .name을 말함

// [3] party 의 1번 객체의 hp 를 출력하세요.
console.log(party[1].name); //"마법사" 출력

// [4] party 의 개수(길이)를 출력하세요.
//     작성 공식: console.log(배열.length);
console.log(party.length); // 2 출력

// [5] for 문으로 party 전체의 name 을 출력하세요.
//     작성 공식: for(...){ console.log(배열[i].name); }
for(let i = 0; i<party.length; i++){
    console.log(party[i].name);
} // 기사, 마법사 각각 출력

// [6] for 문으로 "OO (HP: OO)" 형태로 전체를 출력하세요.
//     작성 공식: console.log(배열[i].name + " (HP: " + 배열[i].hp + ")");
for(let i = 0; i < party.length; i++){
    console.log(party[i].name + " (HP: " + party[i].hp + ")");
} //기사 (HP: 100) / 마법사 (HP: 80) 출력

// [7] 몬스터 {name:"고블린", hp:30}, {name:"오크", hp:60} 를 담은
//     'monsters' 배열을 만드세요.
let monsters = [{name:"고블린", hp:30}, {name:"오크", hp:60}];

// [8] monsters 의 0번 객체의 name 과 hp 를 함께 출력하세요.
console.log(JSON.stringify(monsters[0])); //{"name":"고블린","hp":30} 출력

// [9] for 문으로 monsters 전체의 hp 를 더해 'totalHp' 에 누적하고 출력하세요.
//     작성 공식: 반복 안에서 totalHp += 배열[i].hp;
let totalHp = 0;
for(let i = 0; i < monsters.length; i++){totalHp += monsters[i].hp;}
console.log(totalHp); // 90 출력
</script>
</body>
</html>
