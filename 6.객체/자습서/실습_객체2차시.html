<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>객체 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : 객체 값 추가/수정/삭제

    - 객체.key = 값  → key 가 있으면 수정, 없으면 새로 추가 (문법 같음)
    - delete 객체.key  → key 삭제
    - 모두 점 표기법 사용
    - 게임에서 캐릭터 상태 변경(체력 감소, 버프 추가 등)에 사용
*/

// [1] name "기사", hp 100 을 담은 'character' 객체를 만드세요.
//     작성 공식: let 객체 = { key: value, ... };
let character = { name : "기사",
                    hp : 100
                };

// [2] character 의 hp 를 70으로 수정하세요. (이미 있는 key)
//     작성 공식: 객체.key = 새값;
character.hp = 70;

// [3] character 의 hp 를 출력하세요.
console.log(character.hp); // 70출력

// [4] character 에 level 5 를 새로 추가하세요. (없던 key)
//     작성 공식: 객체.새key = 값;
character.level = 5;

// [5] character 의 level 을 출력하세요.
console.log(character.level); //5출력

// [6] character 에 job "전사" 를 추가하세요.
character.job = "전사";

// [7] character 전체를 출력하세요.
console.log(character); //{name: '기사', hp: 70, level: 5, job: '전사'} 출력 

// [8] character 의 level 을 삭제하세요.
//     작성 공식: delete 객체.key;
delete character.level;

// [9] character 전체를 출력하세요. (level 이 사라짐)
console.log(character); //{name: '기사', hp: 70, job: '전사'} 출력

// [10] character 의 hp 를 20 줄이세요. (현재값에서 빼서 다시 저장)
//      작성 공식: 객체.key = 객체.key - 값;
character.hp = character.hp - 20;
console.log(character.hp); //50출력 

</script>
</body>
</html>
