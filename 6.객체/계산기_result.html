<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>계산기</title>

	<style>
		/* * 선택자 : 페이지 안의 모든 요소(태그)에 공통으로 적용 */
		* {
			box-sizing: border-box; /* padding, border를 포함해서 요소의 전체 너비·높이를 계산 */
			margin: 0; /* 요소 바깥쪽 여백을 0으로 설정 (기본 여백 제거) */
			padding: 0; /* 요소 안쪽 여백을 0으로 설정 (기본 여백 제거) */
		}

		/* body : 웹 페이지 전체(화면 배경 영역)에 적용 */
		body {
			min-height: 100vh; /* 최소 높이를 화면 전체 높이(100vh)만큼 확보 */
			display: flex; /* 자식 요소를 유연하게 배치하는 flex 레이아웃 사용 */
			align-items: center; /* flex 방향(세로) 기준으로 가운데 정렬 */
			justify-content: center; /* flex 방향(가로) 기준으로 가운데 정렬 */
			background: linear-gradient(145deg, #e8ecf1 0%, #d5dce6 100%); /* 145도 각도로 밝은 회색 그라데이션 배경 */
			font-family: "Segoe UI", "Malgun Gothic", sans-serif; /* 글꼴 지정 (영문 Segoe UI, 한글 맑은 고딕, 없으면 sans-serif) */
		}

		/* .calculator : class="calculator"인 div(계산기 본체)에 적용 */
		.calculator {
			background: #1c1c1e; /* 배경색 : 진한 다크 그레이 */
			border-radius: 20px; /* 모서리를 20px만큼 둥글게 */
			padding: 20px; /* 안쪽 여백 20px (테두리와 내용 사이 간격) */
			box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25); /* 아래쪽으로 20px, 흐림 60px, 25% 투명도 검은 그림자 */
			width: 320px; /* 계산기 본체 가로 너비 320px */
		}

		/* .calculator table : 계산기 안의 table(버튼 표)에 적용 */
		.calculator table {
			width: 100%; /* 표 너비를 부모(.calculator)의 100%로 채움 */
			border-collapse: separate; /* 셀 테두리를 각각 따로 그림 (간격 사용 가능) */
			border-spacing: 10px; /* 셀(버튼) 사이 간격 10px */
		}

		/* td : 표의 각 칸(셀)에 적용 */
		td {
			padding: 0; /* 셀 안쪽 여백 0 (버튼이 칸을 꽉 채우도록) */
		}

		/* #data : id="data"인 input(숫자·수식 표시 화면)에 적용 */
		#data {
			width: 100%; /* 가로 너비를 부모(td)의 100%로 채움 */
			height: 72px; /* 세로 높이 72px */
			padding: 0 20px; /* 위·아래 0, 좌·우 20px 안쪽 여백 */
			border: none; /* 테두리 없음 */
			border-radius: 12px; /* 모서리를 12px만큼 둥글게 */
			background: #2c2c2e; /* 배경색 : 어두운 회색 */
			color: #ffffff; /* 글자색 : 흰색 */
			font-size: 2rem; /* 글자 크기 (기본 글자의 2배) */
			font-weight: 300; /* 글자 굵기 : 얇은 편 (100~900, 400=보통) */
			text-align: right; /* 글자를 오른쪽 정렬 (계산기처럼) */
			letter-spacing: 1px; /* 글자 사이 간격 1px */
			outline: none; /* 클릭(포커스) 시 나타나는 테두리 선 제거 */
		}

		/* input[type="button"] : type="button"인 모든 input(계산기 버튼)에 공통 적용 */
		input[type="button"] {
			width: 100%; /* 버튼 가로 너비를 칸(td)의 100%로 채움 */
			height: 56px; /* 버튼 세로 높이 56px */
			border: none; /* 버튼 테두리 없음 */
			border-radius: 12px; /* 버튼 모서리를 12px만큼 둥글게 */
			font-size: 1.25rem; /* 글자 크기 (기본 글자의 1.25배) */
			font-weight: 500; /* 글자 굵기 : 중간보다 약간 굵게 */
			cursor: pointer; /* 마우스를 올리면 손가락(클릭 가능) 모양으로 변경 */
			transition: background 0.15s ease, transform 0.1s ease; /* 배경색·크기 변화를 0.15초·0.1초 동안 부드럽게 */
			font-family: inherit; /* 글꼴을 부모(body)에서 지정한 글꼴 그대로 사용 */
		}

		/* input[type="button"]:active : 버튼을 클릭하고 누르고 있는 순간에 적용 */
		input[type="button"]:active {
			transform: scale(0.96); /* 버튼 크기를 96%로 살짝 줄여 눌리는 느낌 표현 */
		}

		/* 숫자 버튼 (0~9, 소수점 .) */
		input[value="0"],
		input[value="1"],
		input[value="2"],
		input[value="3"],
		input[value="4"],
		input[value="5"],
		input[value="6"],
		input[value="7"],
		input[value="8"],
		input[value="9"],
		input[value="."] {
			background: #3a3a3c; /* 배경색 : 회색 (숫자 버튼) */
			color: #ffffff; /* 글자색 : 흰색 */
		}

		/* 숫자 버튼에 마우스를 올렸을 때(:hover) */
		input[value="0"]:hover,
		input[value="1"]:hover,
		input[value="2"]:hover,
		input[value="3"]:hover,
		input[value="4"]:hover,
		input[value="5"]:hover,
		input[value="6"]:hover,
		input[value="7"]:hover,
		input[value="8"]:hover,
		input[value="9"]:hover,
		input[value="."]:hover {
			background: #48484a; /* 배경색을 조금 더 밝은 회색으로 변경 (마우스 올림 효과) */
		}

		/* 연산자 버튼 (+, -, X, /) */
		input[value="+"],
		input[value="-"],
		input[value="X"],
		input[value="/"] {
			background: #ff9f0a; /* 배경색 : 주황색 (연산자 버튼) */
			color: #ffffff; /* 글자색 : 흰색 */
		}

		/* 연산자 버튼에 마우스를 올렸을 때(:hover) */
		input[value="+"]:hover,
		input[value="-"]:hover,
		input[value="X"]:hover,
		input[value="/"]:hover {
			background: #ffb340; /* 배경색을 더 밝은 주황색으로 변경 */
		}

		/* = (계산 실행) 버튼 */
		input[value="="] {
			background: #0a84ff; /* 배경색 : 파란색 */
			color: #ffffff; /* 글자색 : 흰색 */
			font-size: 1.4rem; /* = 기호를 다른 버튼보다 조금 크게 표시 */
		}

		/* = 버튼에 마우스를 올렸을 때(:hover) */
		input[value="="]:hover {
			background: #409cff; /* 배경색을 더 밝은 파란색으로 변경 */
		}

		/* clear (초기화) 버튼 */
		input[value="clear"] {
			background: #636366; /* 배경색 : 중간 회색 */
			color: #ffffff; /* 글자색 : 흰색 */
			font-size: 1rem; /* 글자 크기 : 기본 크기 */
			letter-spacing: 0.5px; /* 글자 사이 간격 0.5px (clear 글자 가독성) */
		}

		/* clear 버튼에 마우스를 올렸을 때(:hover) */
		input[value="clear"]:hover {
			background: #787880; /* 배경색을 더 밝은 회색으로 변경 */
		}
	</style>
	
	<!-- CDN을 사용한 예시 (웹 환경) math.min.js 라이브러리 사용 (가장 안전하고 강력한 방법2) -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
	
	<script type="text/javascript">

		/*방법2. Math.js 라이브러리 - Function함수 만들어서 사용(가장 안정적이고 강력한 방법) */

		//기능 : 문자열로 된 수식을 매개변수로 전달 받아서 실제 계산을 수행한 후 결과갓을 반환하는 함수
		//예   : '1+2'   '10/2'    '5*6-3'  등을 매개변수 experssion으로 전달받을수 있음
		function calculate(experssion){
			
				  //new Function(...)은 새로운 함수를 만드는 방법입니다.
				  //return ${ experssion } -> 이부분은 사용자가 입력한 문자열을 함수코드로 변환합니다.
				  //						 만약 experssion매개변수값이 '1+2'라면, 3으로 계산해서 반환
				  //(); -> 생성된 함수를 호출하여 실행시키는 호출 구문 
			return	new Function(`return ${ experssion }`)();
		//	return  new Function("return 1+2")();
								
		}


		/*
			1. 아래의 <input type="button"> 버튼들 중에서 하나를 클릭하면
			   클릭한 버튼의 데이터를 매개변수로 전달받아 계산해서 
			   <input type="text" id="data" name="data2" readonly value> 화면에 보여주는 
			   renew 함수 만들기	   					
		*/						
		function renew(item){
			/* 2. 각 버튼을 클릭하면 데이터가 보여질 화면 또는 계산될 결과값을 보여줄 화면을 선택해 옵니다.*/
			let data = document.getElementById("data");
			// <input type="text" id="data" name="data2" readonly value>

			/* 3. 사용자가 어떤 버튼을 클릭했는지 조건 검사 */
			//3.1. 'clear' 버튼을 클릭했다면?
			if(item === 'clear'){

    				//<input id="data" name="data2" readonly value='3'> 빈공백을 value속성에 넣어 
    				//입력되어 보이는 정보를 없애주자

					//<input readonly value="3"> 가 존재하면 
    				//-> <input readonly value=""> 이렇게 ""이 들어가 바뀐다. 
					data.value = "";		

			//3.2. '=' 버튼을 클릭했다면?
			}else if(item === '='){
				/*
					수식 1 버튼을 클릭   
					연산자기호  + 버튼 클릭
					수식 2 버튼을 클릭
					'1 + 2' 이렇게 화면에 보여집니다.  '1 + 2' 는 문자열입니다. 이건 계산X
				
				방법1. eval('숫자+숫자') 함수 이용
				     - 매개변수로 전달한 문자열 '숫자 + 숫자'을 계산하여
					   계산된 결괏값을 숫자로 반환해 주는 함수 입니다.
					   eval('1 + 2');  -> 1 + 2 의 결과 3으로 만들어서 반환함
				*/
			//	 data.value = eval( data.value );
			   /*
				방법2. Math.js 라이브러리에 만들어져 있는 Function함수를 만들어서 사용(가장 안전하고 강력한 방법)
			   */
				data.value = calculate(data.value);
						// = calculate('1 + 2');
						// =         3
			
			//3.3. 'clear'와 '='버튼 이외 숫자 또는  +  -  *  /  중 하나를 클릭했다면?
			}else{

				//클릭한 수식 버튼(1 2 3 4 5 6 7 8 9 0) 또는 연산자가 기호('+' '-' '*' '/' '.' 등) 문자열을 
				// <input type="text" id="data" name="data2" readonly value> 화면의
				// value속성에 값으로 누적해서 넣는다.
				data.value  +=  item;
			//  data.value = data.value + item;
			//         ''  =         '' +  1;
			//         '1' =
			//
			//		   '1' =         '1' + 2;
			//         '12'=
			//				
			//		   '12'=         '12' + '+'			
			//        '12+'=
			//
			//		  '12+'=         '12+' + 3
			//		 '12+3'=  

			
			}


		}

	</script>

</head>
<body>

	<div class="calculator">
	<table>
		<tr>
			<td colspan="4"><input id="data" name="data2" readonly value=""></td>
		</tr>
		<tr>
			<td><input type="button" value="1" onclick="renew(1);"></td>
			<td><input type="button" value="2" onclick="renew(2);"></td>
			<td><input type="button" value="3" onclick="renew(3);"></td>
			<td><input type="button" value="+" onclick="renew('+');"></td> 
		</tr>
		<tr>
			<td><input type="button" value="4" onclick="renew(4);"></td>
			<td><input type="button" value="5" onclick="renew(5);"></td>
			<td><input type="button" value="6" onclick="renew(6);"></td>
			<td><input type="button" value="-" onclick="renew('-');"></td>
		</tr>
		<tr>
			<td><input type="button" value="7" onclick="renew(7);"></td>
			<td><input type="button" value="8" onclick="renew(8);"></td>
			<td><input type="button" value="9" onclick="renew(9);"></td>
			<td><input type="button" value="X" onclick="renew('*');"></td>
		</tr>
		<tr>
			<td colspan="2"><input type="button" value="0" onclick="renew(0);"></td>
			<td><input type="button" value="." onclick="renew('.');"></td>
			<td><input type="button" value="/" onclick="renew('/');" ></td>
		</tr>
		<tr>
			<td colspan="2"><input type="button" value="=" onclick="renew('=');"></td>
			<td colspan="2"><input type="button" value="clear" onclick="renew('clear');"></td>
		</tr>
	</table>
	</div>
</body>
</html>
