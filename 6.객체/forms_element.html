<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form name="frm1">
        <label for="uname">이름</label>
        <input type="text" id="uname" name="uname" value="김길동">
        <label for="age">나이</label>
        <input type="text" id="age" name="age" value="">

        <select id="gender" name="gender">
            <option value="male">남</option>
            <option value="female" selected>여</option>
        </select>

        <button type="submit">전송</button>
    </form>
    <script>
        /*
            1. <form name="frm1"> ....</form> 선택 해 옴 

            방법 : document.frm1

            2. <form name="frm1"> ....</form> 내부에 작성된 하위 입력할수 있는 자식태그들을
               모두 HTMLFormControlsCollection배열메모리에 담아 배열메모리 자체를 반환합니다.

            방법 : document.frm1.elements
        */
            const HCC = document.frm1.elements;
        // [ <input>,   <input>,  <selelct>,  <button>  ]
        //      0          1        2             3         

            //0 index위치에 저장된 자식 아래의 <input>태그를 선택해 옵니다.
            //<input type="text" id="uname" name="uname" value="김길동">
            const input1 = HCC[0];
            console.log(input1);
        
      		//위 선택한 <form>...</form>태그 안에 작성된 하위 태그들중에서
            //[ ]대괄호 안에 적은 name속성값이 uname인 
            //<input type="text" id="uname" name="uname" value="김길동"> 자식 요소를 선택해 옵니다.
            const input2 = HCC['uname']
            console.log(input2);
     
            //document.frm1
            //->  <form name="frm1"></form> 태그를 선택해 오는데 
            //->   name속성값이  frm1인  <form>한쌍을 선택합니다.

            //document.frm1.uname;
            //->  document.frm1으로 인해서 선택한 <form></form> 내부에 자식 입력태그들 중에서
            //   name속성값이 uname인  <input type="text" id="uname" name="uname" value="김길동">
            //	 자식 입력 태그를 최종 선택 
            const input3 = document.frm1.uname;
            console.log(input3);

            //name속성값이 frm1인 <form></form>을 먼저 선택하고
            //그안에 작성되어 있는 하위 태그를 선택해 오는데
            //name속성값이 age인  <input type="text" id="age" name="age">을 최종 선택해 와서 input4상수에 저장
            const input4 = document.frm1.age;
            console.log(input4);

            /*
               순서1. document.forms속성을 호출하면  작성되어 있는 <form>...</form>태그를 배열에 담아 선택해 옵니다.
                     [<form>...</form>]
                             0          index

               순서2. document.forms[0] 까지 작성하면 배열에서 <form>...</form>을 얻어 옵니다.
               
               순서3. document.forms[0].gender; 작성처럼 document.forms[0].name속성값; 을 작성하면
                     <form> ...</form> 사이에 작성된 
                     자식 <select id="gender" name="gender">...</select>한쌍 을 최종 선택 해 옵니다.
            */
            const selectElement =  document.forms[0].gender;
                /*
                <select id="gender" name="gender">

                    <option value="male">남</option>
                    <option value="female" selected >여</option>

                </select> 요소를 최종 선택해 옵니다.
                */

            //선택된  option요소의 value속성의 값 가져오기    
            const selectedValue = selectElement.value;
            console.log(selectedValue); //  female

    </script>
  <!-- 
                    <form name="frm1">
                        <label for="uname">이름</label>
                        <input type="text" id="uname" name="uname" value="김길동">
                        <label for="age">나이</label>
                        <input type="text" id="age" name="age" value="">
                        <select id="gender" name="gender">
                            <option value="male">남</option>
                            <option value="female">여</option>
                        </select>
                        <button type="submit">전송</button>
                    </form>
--> 
</body>
</html>
