<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
		 switch선택문을 사용하여  클라이언트가 입력한 '가위','바위','보' 중 하나를
		 숫자로 변환 시킨 후 , 변수 tNum에 저장합니다.
		 만일 클라이언트가  가위 바위 보 중에서 하나를 입력하지 않고 잘못된 값을 입력할경우
		 window객체의 alert("경고한다"); 메소드를 호출하여 
		 경고 메세지창을 보여 주자.
		 마지막으로 location객체의 reload()메소드를 호출하여 
		 웹브라우저의 새로고침F5(현재 보고 있는 사이트를 재요청)하게 하여 
		 다시 입력 받을수 있는 prompt를 띄워 주자
	 -->

<script>

        document.write("<h1>컴퓨터가 랜덤으로 내는 가위, 바위, 보 중 하나 맞추는 게임</h1>")

        //window객체 메모리 내부에 만들어져 있는 prompt()메소드를 호출해서
        //클라이언트에게 "가위", "바위", "보" 중에 하나의 단어를 입력받아 t변수에 저장
        let t = window.prompt("가위, 바위, 보 중에서 하나의 단어만 입력하세요","가위");
        //"가위"

        //클라이언트가 "가위" 입력시 -> 1저장
        //           "바위" 입력시 -> 2저장
        //            "보" 입력시 -> 3저장
        //위처럼 저장할  tNum변수 생성
        let tNum

        switch (t) {//클라이언트가 입력한 값("가위" or "바위" or "보" 중에서 하나의 값)으로 판단할 값

            case "가위": //t변수에 저장된 클라이언트가 입력한 값이 "가위"와 같으냐?
                tNum = 1;
                break;

            case "바위": //t변수에 저장된 클라이언트가 입력한 값이 "바위"와 같으면?
                tNum = 2;
                break;
            
            case "보": //t변수에 저장된 클라이언트가 입력한 값이 "바위"와 같으면?
                tNum = 3;
                break;

            default: //"가위","바위","보" 이외의 다른 데이터를 입력했을 경우!!!
                window.alert("잘못 작성하셨습니다."); //알림창(경고메세지)
                break;

                //F5를 자동으로 누른 기능과 같다.
                location.reload(); //새로고침처럼 현재 보고 있는 math_ob2.heml URL을
                                   //주소창에 자동으로 입력해 주고 엔터를 눌러 현재 페이지를 재요청하는 
                                   //기능의 메소드
            }

</script>



</body>
</html>
