    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        body {

            padding-top: 50px;
        }

            */

            */
            align-items: center;

            /*

            */

                원의 세로 크기
            */

            */

            /*

            */
            border: 2px solid black;
        }

        /*
            로또 번호 생성 버튼의 모양입니다.
        */
        button {
            padding: 12px 25px;

    </style>
</head>
