<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>연습문제 1</title>
    <link rel="stylesheet" href="css/quiz-1.css" />
  </head>
  <body>
    <div id="container">
      <h1>참가자 명단</h1>
      <form>
        <ul id="userInput"> <!--  -->
          <li>
            <label for="username">이 름</label> 
            <input type="text" id="username" />
          </li>
          <li>
            <label for="major">전 공</label>
            <input type="text" id="major" />
          </li>
        </ul>
        <button>등록하기</button>
      </form>

      <table id="attendant">
        <thead>
          <tr>
            <th>이 름</th>
            <th>전 공</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script>
      const username = document.querySelector("#username");  // 참가자 이름 <input type="text" id="username" /> 요소 선택
      const major = document.querySelector("#major"); // 참가자 전공 <input type="text" id="major" />요소 선택
      const bttn = document.querySelector("form > button"); // <button>등록하기</button>버튼 요소에 이벤트 등록 후 처리

      //선택한 요소에 click 이벤트를 등록해
      //사용자가 click 할때마다 이벤트핸들러 함수가 호출되어 실행
      bttn.addEventListener("click", (e) => {

        e.preventDefault();

        let tbody = document.querySelector("#attendant > tbody"); 

    
        let newTr = document.createElement("tr"); 

        let nameTd = document.createElement("td");
            nameTd.innerText = username.value;
  

        username.value = "";


        let majorTd = document.createElement("td");
            majorTd.innerText = major.value;
         

        major.value = "";


        newTr.appendChild(nameTd);


        newTr.appendChild(majorTd);



        tbody.appendChild(newTr);

      });
    </script>
  </body>
</html>
